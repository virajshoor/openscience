name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: cd sidecar && uv sync --extra dev
      - run: cd sidecar && uv run ruff check .
      - run: cd sidecar && uv run pytest

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: mkdir -p src-tauri/binaries && touch src-tauri/binaries/openscience-sidecar-x86_64-unknown-linux-gnu
      - run: cd src-tauri && cargo fmt --check
      - run: cd src-tauri && cargo clippy -- -D warnings
      - run: cd src-tauri && cargo test
